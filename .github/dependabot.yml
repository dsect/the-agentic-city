version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    groups:
      github-actions:
        patterns:
          - "*"
  - package-ecosystem: "npm"
    directory: "/web"
    schedule:
      interval: "monthly"
    groups:
      web:
        patterns:
          - "*"
  - package-ecosystem: "pip"
    directory: "/api"
    schedule:
      interval: "monthly"
    groups:
      api:
        patterns:
          - "*"
